volumes:
  postgres_data:
  redis_data:
  n8n_data:

x-n8n-common: &n8n-common
  image: n8nio/n8n:${N8N_VERSION}
  restart: unless-stopped
  environment: &n8n-env
    GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
    TZ: ${GENERIC_TIMEZONE}
    N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    DB_TYPE: ${DB_TYPE}
    DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST}
    DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT}
    DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE}
    DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER}
    DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD}
    EXECUTIONS_MODE: ${EXECUTIONS_MODE}
    QUEUE_BULL_REDIS_HOST: ${QUEUE_BULL_REDIS_HOST}
    QUEUE_BULL_REDIS_PORT: ${QUEUE_BULL_REDIS_PORT}
    QUEUE_BULL_REDIS_PASSWORD: ${QUEUE_BULL_REDIS_PASSWORD}
    N8N_RUNNERS_MODE: ${N8N_RUNNERS_MODE}
    N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
    N8N_TRUST_PROXY: ${N8N_TRUST_PROXY}
    N8N_ALLOW_UNSAFE_WEBHOOK_URL: ${N8N_ALLOW_UNSAFE_WEBHOOK_URL}
    N8N_PROXY_HOPS: ${N8N_PROXY_HOPS}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - n8n-net

services:

  # ══════════════════════════════════════════════════════
  #   PostgreSQL
  # ══════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-net

  # ══════════════════════════════════════════════════════
  #   Redis
  # ══════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1024mb
      --maxmemory-policy allkeys-lru
#      --appendonly yes #uncomment for persistency
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-net

  # ══════════════════════════════════════════════════════
  #   n8n Main
  # ══════════════════════════════════════════════════════
  n8n-main:
    <<: *n8n-common
    hostname: n8n-main
    environment:
      <<: *n8n-env
      #geçici olarak
      N8N_SECURE_COOKIE : false
    
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}

      N8N_HOST: 0.0.0.0
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: ${OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS}
      N8N_RUNNERS_SERVER_URI: http://n8n-runner-main:5679
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - host.docker.internal:host-gateway

  # Runner sidecar for Main
  n8n-runner-main:
    image: n8nio/runners:${N8N_VERSION}
    restart: unless-stopped
    hostname: n8n-runner-main
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_N8N_URI: http://n8n-main:5678
      N8N_RUNNERS_MAX_CONCURRENCY: 3
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
    depends_on:
      - n8n-main
    networks:
      - n8n-net
    extra_hosts:
      - host.docker.internal:host-gateway

  # ══════════════════════════════════════════════════════
  #   Webhook Processor
  # ══════════════════════════════════════════════════════
  n8n-webhook:
    <<: *n8n-common
    hostname: n8n-webhook
    command: webhook
    environment:
      <<: *n8n-env
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_RUNNERS_SERVER_URI: http://n8n-runner-webhook:5679

  # Runner sidecar for Webhook
  n8n-runner-webhook:
    image: n8nio/runners:${N8N_VERSION}
    restart: unless-stopped
    hostname: n8n-runner-webhook
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_N8N_URI: http://n8n-webhook:5678
      N8N_RUNNERS_MAX_CONCURRENCY: 3
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
    depends_on:
      - n8n-webhook
    networks:
      - n8n-net

  # ══════════════════════════════════════════════════════
  #   Worker
  # ══════════════════════════════════════════════════════
  n8n-worker:
    <<: *n8n-common
    hostname: n8n-worker
    command: worker
    environment:
      <<: *n8n-env
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      QUEUE_WORKER_CONCURRENCY: 3
      N8N_RUNNERS_SERVER_URI: http://n8n-runner-worker:5679
    extra_hosts:
      - host.docker.internal:host-gateway

  # Runner sidecar for Worker
  n8n-runner-worker:
    image: n8nio/runners:${N8N_VERSION}
    restart: unless-stopped
    hostname: n8n-runner-worker
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_N8N_URI: http://n8n-worker:5678
      N8N_RUNNERS_MAX_CONCURRENCY: 3
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
    depends_on:
      - n8n-worker
    networks:
      - n8n-net
    extra_hosts:
      - host.docker.internal:host-gateway

  n8n-nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - n8n-net


networks:
  n8n-net:
    driver: bridge
