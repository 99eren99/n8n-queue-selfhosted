user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    
    server {
        listen 80;

        # Production Webhooks → Webhook Processor
        location /webhook/ {
            proxy_pass http://n8n-webhook:5678;
            
            # Core WebSocket requirements
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Standard proxy headers
            proxy_set_header Host $http_host; 
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            # Fix the Origin Mismatch
            proxy_set_header Origin $http_origin;
            
            # Prevent timeouts on long-running UI sessions and executions
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Production HITL → Webhook Processor
        location /webhook-waiting/ {
            proxy_pass http://n8n-webhook:5678;
            
            # Core WebSocket requirements
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Standard proxy headers
            proxy_set_header Host $http_host; 
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            # Fix the Origin Mismatch
            proxy_set_header Origin $http_origin;
            
            # Prevent timeouts on long-running UI sessions and executions
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Test Webhooks ("Test workflow" button) → Main
        location /webhook-test/ {
            proxy_pass http://n8n-main:5678;

            # Core WebSocket requirements
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
           # Standard proxy headers
            proxy_set_header Host $http_host; 
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            # Fix the Origin Mismatch
            proxy_set_header Origin $http_origin;
            
            # Prevent timeouts on long-running UI sessions and executions
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Everything else (editor, API) → Main
        location / {
            proxy_pass http://n8n-main:5678;
            
            # Core WebSocket requirements
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Standard proxy headers
            proxy_set_header Host $http_host; 
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            # Fix the Origin Mismatch
            proxy_set_header Origin $http_origin;
            
            # Prevent timeouts on long-running UI sessions and executions
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        
    }
}